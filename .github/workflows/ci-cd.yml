name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - main

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Run HTML Check
        run: npm run lint:html

      - name: Run CSS Check
        run: npm run lint:css || true

      - name: Run JavaScript Check
        run: npm run lint:js

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Tests
        run: npm test

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t online-voting-app:${{ github.sha }} .
          docker tag online-voting-app:${{ github.sha }} \
            787309524539.dkr.ecr.ap-southeast-2.amazonaws.com/online-voting-app:${{ github.sha }}

      - name: Push Docker Image
        run: |
          docker push 787309524539.dkr.ecr.ap-southeast-2.amazonaws.com/online-voting-app:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            ECR_REGISTRY="787309524539.dkr.ecr.ap-southeast-2.amazonaws.com"
            ECR_REPO="$ECR_REGISTRY/online-voting-app"
            NEW_IMAGE="$ECR_REPO:${{ github.sha }}"

            echo "Logging into Amazon ECR..."
            aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin $ECR_REGISTRY

            echo "Saving current running image..."
            OLD_IMAGE=$(docker inspect online-voting --format='{{.Config.Image}}' 2>/dev/null || true)

            if [ -n "$OLD_IMAGE" ]; then
              echo "Current image: $OLD_IMAGE"
            else
              echo "No existing container found."
            fi

            echo "Pulling new Docker image..."
            docker pull $NEW_IMAGE

            echo "Stopping old container..."
            docker stop online-voting || true

            echo "Removing old container..."
            docker rm online-voting || true

            echo "Starting new container..."
            docker run -d \
              --name online-voting \
              -p 80:80 \
              --restart unless-stopped \
              $NEW_IMAGE

            echo "Waiting for application to start..."
            sleep 15

            echo "Running Health Check..."

            if curl -f http://localhost/health; then
              echo "Health Check Passed"
              echo "Deployment Successful"
            else
              echo "Health Check Failed"
              echo "Rolling back to previous version..."

              docker stop online-voting || true
              docker rm online-voting || true

              if [ -n "$OLD_IMAGE" ]; then
                docker run -d \
                  --name online-voting \
                  -p 80:80 \
                  --restart unless-stopped \
                  $OLD_IMAGE

                echo "Rollback completed successfully."
              else
                echo "No previous image available for rollback."
              fi

              exit 1
            fi
